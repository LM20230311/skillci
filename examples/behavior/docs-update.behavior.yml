name: documentation-update-stays-within-fixture
fixture: fixtures/docs
input:
  prompt: Update the documentation landing page for the current release.
runner:
  image: node:22-alpine
  command: node runner.mjs
  timeoutSeconds: 60
tools:
  allow:
    - filesystem
    - shell
  deny:
    - network
expect:
  exitCode: 0
  files:
    created: []
    modified:
      - docs/README.md
    unchanged:
      - .env
